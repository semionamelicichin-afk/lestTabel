name: Daily Check-In UI

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      USE_STORAGE_STATE: 'true'
      SIGNIN_URL: https://lesta.ru/id/signin/
      DAILY_CHECKIN_URL: https://tanki.su/ru/daily-check-in/
      STORAGE_STATE_PATH: playwright/.auth/user.json
      STORAGE_STATE_JSON: ${{ secrets.STORAGE_STATE_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare storage state file (required in CI)
        shell: bash
        run: |
          if [ -z "$STORAGE_STATE_JSON" ]; then
            echo "::error::STORAGE_STATE_JSON secret is required in CI. Update it from a fresh local authenticated session."
            exit 1
          fi

          mkdir -p playwright/.auth
          echo "$STORAGE_STATE_JSON" > "$STORAGE_STATE_PATH"

      - name: Run daily check-in test
        run: npx playwright test tests/daily-check-in.spec.ts --project=daily-check-in

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
